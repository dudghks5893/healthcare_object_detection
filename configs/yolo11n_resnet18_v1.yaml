version: v1
seed: 42

paths:
  annot_root: data/raw/v1/train_annotations
  train_img_dir: data/raw/v1/train_images
  test_img_dir: data/raw/v1/test_images
  processed_dir: data/processed/v1

split:
  val_size: 0.2
  random_state: 42

stage1:
  model_name: yolo11n.pt
  dataset_dir: data/processed/v1/yolo_stage1_dataset
  checkpoint_dir: checkpoints/v1/stage1_detector
  run_name: yolo11n
  epochs: 5
  imgsz: 960
  batch: 8
  workers: 4
  patience: 15
  conf: 0.25
  iou: 0.50

stage2:
  model_name: resnet18
  pretrained: false
  crop_dataset_dir: data/processed/v1/stage2_classifier_crop_dataset
  checkpoint_dir: checkpoints/v1/stage2_classifier/resnet18
  img_size: 224
  batch_size: 32
  epochs: 5
  lr: 0.001
  num_workers: 4
  pin_memory: true
  crop_margin_ratio: 0.10

output:
  submission_csv: outputs/submission/v1/predict_2stage.csv
  predict_vis_dir: outputs/predict/v1
  save_vis_limit: 10