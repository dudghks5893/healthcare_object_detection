version: v2
seed: 42

paths:
  annot_root: data/raw/v2/train_annotations
  train_img_dir: data/raw/v2/train_images
  test_img_dir: data/raw/v1/test_images
  processed_dir: data/processed/v2

split:
  val_size: 0.2
  random_state: 42

stage1:
  dataset_dir: data/processed/v2/yolo_stage1_dataset
  checkpoint_dir: checkpoints/v2/stage1_detector

  model_name: yolo11s.pt
  run_name: yolo11s_epoch_20

  # 학습 기본 설정
  epochs: 20
  imgsz: 768
  batch: 8
  workers: 4
  patience: 10
  val: true
  pretrained: true

  # 추론 / 후처리 기본값
  conf: 0.25
  iou: 0.50

  # optimizer / lr
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0005
  cos_lr: true
  warmup_epochs: 2.0

  # # loss weight
  # box: 7.5
  # cls: 0.5
  # dfl: 1.5

  # # augmentation
  # hsv_h: 0.00
  # hsv_s: 0.0
  # hsv_v: 0.0
  # degrees: 0.0
  # translate: 0.0
  # scale: 0.0
  # fliplr: 0.0
  # flipud: 0.0
  # mosaic: 0.0
  # mixup: 0.0
  # copy_paste: 0.0

  # # 기타
  # save: true
  # verbose: true
  # plots: true
  # exist_ok: true

stage2:
  crop_dataset_dir: data/processed/v2/stage2_classifier_crop_dataset
  checkpoint_dir: checkpoints/v2/stage2_classifier/resnet50_transforms_epoch_20_v2
  train_csv: data/processed/v2/stage2_classifier_crop_dataset/metadata/train_crop_labels.csv
  val_csv: data/processed/v2/stage2_classifier_crop_dataset/metadata/val_crop_labels.csv

  model_name: resnet50
  pretrained: true
  img_size: 224
  batch_size: 32
  epochs: 20
  lr: 0.0001
  num_workers: 4
  pin_memory: true
  crop_margin_ratio: 0.10

  augmentation:
    use_train_aug: true

    color_jitter:
      brightness: 0.08
      contrast: 0.08
      saturation: 0.03
      hue: 0.0
      p: 0.4

    random_affine:
      degrees: 5
      translate: [0.02, 0.02]
      scale: [0.98, 1.02]
      p: 0.3

    gaussian_blur:
      kernel_size: 3
      sigma: [0.1, 0.5]
      p: 0.2

    horizontal_flip:
      p: 0.0

    vertical_flip:
      p: 0.3

  aug_preview:
    enabled: true
    num_samples: 12
    save_dir: outputs/aug_preview/stage2
    log_to_wandb: true

output:
  submission_csv: outputs/submission/v2/yolo11s_resnet50_transforms_epoch_20_v2.csv
  predict_vis_dir: outputs/predict/v2
  save_vis_limit: 10