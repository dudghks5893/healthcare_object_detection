version: v1
seed: 42

paths:
  annot_root: data/raw/v1/train_annotations
  train_img_dir: data/raw/v1/train_images
  test_img_dir: data/raw/v1/test_images
  processed_dir: data/processed/v1

split:
  val_size: 0.2
  random_state: 42

stage1:
  model_name: yolo11s.pt
  dataset_dir: data/processed/v1/yolo_stage1_dataset
  checkpoint_dir: checkpoints/v1/stage1_detector
  run_name: yolo11s

  # 학습 기본 설정
  epochs: 20
  imgsz: 768
  batch: 8
  workers: 4
  patience: 10
  val: true
  pretrained: true

  # 추론 / 후처리 기본값
  conf: 0.25
  iou: 0.50

  # optimizer / lr
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0005
  cos_lr: true
  warmup_epochs: 2.0

  # # loss weight
  # box: 7.5
  # cls: 0.5
  # dfl: 1.5

  # # augmentation
  # hsv_h: 0.00
  # hsv_s: 0.0
  # hsv_v: 0.0
  # degrees: 0.0
  # translate: 0.0
  # scale: 0.0
  # fliplr: 0.0
  # flipud: 0.0
  # mosaic: 0.0
  # mixup: 0.0
  # copy_paste: 0.0

  # # 기타
  # save: true
  # verbose: true
  # plots: true
  # exist_ok: true

stage2:
  model_name: resnet50
  pretrained: true
  crop_dataset_dir: data/processed/v1/stage2_classifier_crop_dataset
  checkpoint_dir: checkpoints/v1/stage2_classifier/resnet50_transforms
  img_size: 224
  batch_size: 32
  epochs: 20
  lr: 0.0001
  num_workers: 4
  pin_memory: true
  crop_margin_ratio: 0.10

  # augmentation:
  #   use_train_aug: true

  #   color_jitter:
